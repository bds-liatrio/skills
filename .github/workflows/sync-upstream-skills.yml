name: Sync Upstream Skills

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:

concurrency:
  group: sync-upstream-skills
  cancel-in-progress: true

jobs:
  sync:
    name: Vendor upstream skills
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # GITHUB_TOKEN pushes do not trigger other workflows in this repo.
      # Checkout with a PAT so vendor commits run CI and other push workflows.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_UPSTREAM_PAT }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Vendor upstream skills from the catalog
        run: uv run python scripts/sync_upstream_skills.py

      - name: Commit refreshed skills if anything changed
        run: |
          if [ -z "$(git status --porcelain skills upstream-skills.lock.json)" ]; then
            echo "No upstream changes to vendor."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills upstream-skills.lock.json
          git commit -m "chore(vendor): sync upstream skills"
          git push
