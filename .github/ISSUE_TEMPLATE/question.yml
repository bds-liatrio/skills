name: Question
description: Ask a question about using or installing these skills.
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant details (skill name, agent, what you have tried).
    validations:
      required: false
